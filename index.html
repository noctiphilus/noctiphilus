<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOCTIPHILUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --fg: #0a0a0a;
      --muted: #888;
      --nav-bg: rgba(255,255,255,0.75);
      --border: rgba(0,0,0,0.08);
      --g1: rgba(210,210,220,0.45);
      --g2: rgba(180,190,210,0.3);
      --g3: rgba(220,215,210,0.35);
      --transition: 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    [data-theme="dark"] {
      --bg: #080808;
      --fg: #f0f0f0;
      --muted: #555;
      --nav-bg: rgba(8,8,8,0.82);
      --border: rgba(255,255,255,0.07);
      --g1: rgba(30,30,45,0.8);
      --g2: rgba(20,25,40,0.7);
      --g3: rgba(35,28,38,0.8);
    }

    html, body {
      height: 100%;
      font-family: 'Jost', sans-serif;
      background: var(--bg);
      color: var(--fg);
      transition: background var(--transition), color var(--transition);
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
    }
    .orb-1 {
      width: 55vw; height: 55vw;
      top: -15%; left: -10%;
      background: radial-gradient(circle, var(--g1) 0%, transparent 70%);
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 45vw; height: 45vw;
      bottom: -10%; right: -5%;
      background: radial-gradient(circle, var(--g2) 0%, transparent 70%);
      animation: drift2 22s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 35vw; height: 35vw;
      top: 40%; left: 55%;
      background: radial-gradient(circle, var(--g3) 0%, transparent 70%);
      animation: drift3 15s ease-in-out infinite alternate;
    }
    @keyframes drift1 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(8vw,6vh) scale(1.08); }
    }
    @keyframes drift2 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(-6vw,-8vh) scale(1.05); }
    }
    @keyframes drift3 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(-5vw,5vh) scale(0.95); }
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem,5vw,4rem);
      height: 60px;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition), border-color var(--transition);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.35em;
      color: var(--fg);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.3s;
    }
    .nav-logo:hover { opacity: 1; }

    .nav-links {
      display: flex;
      list-style: none;
      gap: clamp(1.2rem,3vw,2.5rem);
    }
    .nav-links a {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--muted);
      font-weight: 300;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--fg); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* Lang toggle */
    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
      padding: 0;
      transition: color 0.3s;
    }
    .lang-btn:hover { color: var(--fg); }

    /* Theme toggle */
    .theme-toggle {
      width: 36px; height: 20px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.3s;
      outline: none;
      flex-shrink: 0;
    }
    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.3s, background 0.3s;
    }
    [data-theme="dark"] .theme-toggle::after {
      transform: translateX(16px);
      background: var(--fg);
    }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 22px; height: 1px;
      background: var(--fg);
      transition: all 0.3s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* Mobile menu */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 60px; left: 0; right: 0;
      background: var(--nav-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem clamp(1.5rem,5vw,4rem);
      z-index: 99;
      flex-direction: column;
      gap: 1.2rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--muted);
      font-weight: 300;
      transition: color 0.3s;
    }
    .mobile-menu a:hover { color: var(--fg); }

    /* ── HERO ── */
    main {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 2rem 2rem;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem,10vw,7.5rem);
      letter-spacing: 0.22em;
      line-height: 1;
      color: var(--fg);
      animation: fadeUp 1.2s cubic-bezier(0.4,0,0.2,1) both;
    }

    .divider {
      width: 30px; height: 1px;
      background: var(--muted);
      opacity: 0.35;
      margin: 2.5rem auto;
      animation: fadeUp 1.2s 0.3s cubic-bezier(0.4,0,0.2,1) both;
    }

    /* ── SOCIALS ── */
    .socials {
      display: flex;
      gap: 1.8rem;
      align-items: center;
      animation: fadeUp 1.2s 0.5s cubic-bezier(0.4,0,0.2,1) both;
    }
    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: color 0.3s, transform 0.3s;
      text-decoration: none;
    }
    .socials a:hover {
      color: var(--fg);
      transform: translateY(-2px);
    }
    .socials svg {
      width: 18px; height: 18px;
      fill: currentColor;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      .nav-links, .lang-btn { display: none; }
      .hamburger { display: flex; }
    }
  </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

  <nav>
    <a href="/" class="nav-logo">N</a>

    </ul>

    <div class="nav-right">
      <button class="lang-btn" id="lang-toggle" aria-label="Toggle language">EN</button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema"></button>
      <button class="hamburger" id="hamburger" aria-label="Menú">
        <span></span><span></span><span></span>

  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu">

  <script>
    // ── TRANSLATIONS (from your original script.js) ──
    const translations = {
      es: {
        home: "Inicio", blog: "Blog", multimedia: "Galería",
        about: "Sobre mí", contact: "Contacto", toggleLang: "EN",
      },
      en: {
        home: "Home", blog: "Blog", multimedia: "Gallery",
        about: "About Me", contact: "Contact", toggleLang: "ES",
      }
    };

    let currentLang = localStorage.getItem('lang') || 'es';

    function setLanguage(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      localStorage.setItem('lang', lang);
      document.querySelectorAll('[data-translate]').forEach(el => {
        const key = el.getAttribute('data-translate');
        if (translations[lang]?.[key]) el.textContent = translations[lang][key];
      });
      const label = translations[lang].toggleLang;
      document.getElementById('lang-toggle').textContent = label;
      const mob = document.getElementById('mobile-lang-toggle');
      if (mob) mob.textContent = label;
    }

    function toggleLanguage() {
      setLanguage(currentLang === 'es' ? 'en' : 'es');
    }

    document.getElementById('lang-toggle').addEventListener('click', toggleLanguage);
    document.getElementById('mobile-lang-toggle')?.addEventListener('click', toggleLanguage);

    // ── THEME ──
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', savedTheme);

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // ── HAMBURGER ──
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    });
    mobileMenu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        hamburger.classList.remove('open');
        mobileMenu.classList.remove('open');
      });
    });

    // Init language
    setLanguage(currentLang);
  </script>
</body>
</html>
